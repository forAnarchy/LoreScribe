<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LoreScribe PRO — Game Translation Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0c10; --bg2:#0f1218; --border:#1e2a3a; --accent:#00b4d8;
            --gold:#e8a020; --ok:#22c55e; --err:#ef4444; --txt:#c8d8e8;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Exo 2', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Toolbar */
        header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 20px; }
        .logo { font-family: 'Rajdhani'; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 10px 20px; background: #141920; border-bottom: 1px solid var(--border); }
        
        input, select, button { 
            background: #0a0c10; border: 1px solid var(--border); color: #fff; 
            padding: 6px 12px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; 
        }
        button { cursor: pointer; transition: 0.2s; background: var(--border); }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.gold { border-color: var(--gold); color: var(--gold); }
        button.gold:hover { background: rgba(232, 160, 32, 0.1); }

        /* Table Area */
        .table-container { flex: 1; overflow-y: auto; padding: 0 20px; }
        .row { display: grid; grid-template-columns: 50px 1fr 1fr 100px; border-bottom: 1px solid #1e2a3a; padding: 8px 0; align-items: start; }
        .row:hover { background: rgba(255,255,255,0.02); }
        .cell { padding: 4px 8px; font-size: 13px; }
        .num { color: #4a6888; text-align: center; }
        .src { color: #7a99b8; white-space: pre-wrap; }
        textarea.trg { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: #fff; resize: vertical; outline: none; transition: 0.2s; }
        textarea.trg:focus { border-bottom-color: var(--accent); background: rgba(0,180,216,0.05); }
        .status { text-align: center; font-size: 10px; font-weight: bold; }

        /* UI Elements */
        #progress-bar { height: 2px; background: var(--accent); width: 0%; transition: 0.3s; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; font-size: 13px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid var(--border); background: var(--bg2); transition: 0.3s; }
        .toast.ok { border-color: var(--ok); color: var(--ok); }
        .toast.err { border-color: var(--err); color: var(--err); }
    </style>
</head>
<body>

<header>
    <div class="logo">LORESCRIBE <span>PRO</span></div>
    <div id="stats" style="font-size: 12px; font-family: 'Share Tech Mono';">Hazır.</div>
</header>

<div id="progress-bar"></div>

<div class="toolbar">
    <input type="file" id="file-input" style="display:none" onchange="handleFile(this)">
    <button onclick="document.getElementById('file-input').click()">📂 Dosya Yükle</button>
    <button onclick="exportFile()" class="gold">⬇ Dışa Aktar</button>
    <div style="flex:1"></div>
    <input type="password" id="api-key-input" placeholder="Gemini API Key..." style="width:250px">
    <select id="api-model-select">
        <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash (Önerilen)</option>
        <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro (Yavaş/Zeki)</option>
        <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Hızlı)</option>
    </select>
    <button onclick="autoFixPRO()" class="gold">✨ Auto-Fix PRO (Batch)</button>
</div>

<div class="table-container" id="table-wrap">
    <div style="text-align:center; padding:50px; color:#4a6888;">Lütfen bir .txt (sf3 formatı) dosyası yükleyin.</div>
</div>

<script>
let globalRows = []; // Orijinal verileri tutar

// --- YARDIMCI FONKSİYONLAR ---
function getAPIKey() { return document.getElementById('api-key-input').value.trim(); }
function getModel() { return document.getElementById('api-model-select').value; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

// --- GEMINI API ÇAĞRISI (SENİN GELİŞTİRDİĞİN VERSİYON) ---
async function callGemini(prompt, retry = 0) {
    const API_KEY = getAPIKey();
    if(!API_KEY) { showToast("API Key eksik!", "err"); return null; }

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModel()}:generateContent?key=${API_KEY}`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000); // 25sn

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        clearTimeout(timeout);

        if (res.status === 429) return "RATE_LIMIT";
        if (res.status === 404) return "MODEL_NOT_FOUND";

        if (res.status >= 500 && retry < 2) {
            await sleep(3000);
            return callGemini(prompt, retry + 1);
        }

        if (!res.ok) return null;

        const data = await res.json();
        return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;

    } catch (err) {
        clearTimeout(timeout);
        return null;
    }
}

// --- JSON AYIKLAMA (REGEX DESTEKLİ) ---
function extractJSON(text) {
    try {
        const match = text.match(/\[[\s\S]*\]/);
        if (!match) return null;
        return JSON.parse(match[0].replace(/```json|```/g, "").trim());
    } catch (e) { return null; }
}

// --- DOSYA İŞLEMLERİ ---
function handleFile(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n');
        const wrap = document.getElementById('table-wrap');
        wrap.innerHTML = '';
        globalRows = [];

        lines.forEach((line, idx) => {
            if(!line.trim() || line.startsWith('#')) return;
            const parts = line.split('|');
            if(parts.length < 3) return;

            const rowData = { offset: parts[0], bytes: parts[1], orig: parts[2], trans: parts[2] };
            globalRows.push(rowData);

            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `
                <div class="cell num">${idx+1}</div>
                <div class="cell src">${rowData.orig}</div>
                <div class="cell"><textarea class="trg" id="trg-${globalRows.length-1}">${rowData.trans}</textarea></div>
                <div class="cell status" id="stat-${globalRows.length-1}" style="color:#4a6888">${rowData.bytes} BYTES</div>
            `;
            wrap.appendChild(div);
        });
        showToast(`${globalRows.length} satır yüklendi.`);
        document.getElementById('stats').textContent = `Toplam: ${globalRows.length}`;
    };
    reader.readAsText(file, 'UTF-8');
}

// --- ANA OTO-DÜZELTME (PRO BATCH) ---
async function autoFixPRO() {
    const BATCH_SIZE = 15; // Güvenli sınır
    const SAFE_DELAY = 7000; // Ücretsiz kota için 7 saniye mola
    
    const longRows = globalRows.map((r, i) => ({ ...r, index: i }))
                               .filter(r => (r.trans.length * 2) > r.bytes); // Sadece uzunları seç

    if (!longRows.length) { showToast("Düzeltilecek uzun satır bulunamadı.", "ok"); return; }
    if (!getAPIKey()) { showToast("Lütfen API anahtarını girin.", "err"); return; }

    showToast(`${longRows.length} satır paketler halinde işleniyor...`);

    for (let i = 0; i < longRows.length; i += BATCH_SIZE) {
        const batch = longRows.slice(i, i + BATCH_SIZE);
        const progress = Math.round(((i + batch.length) / longRows.length) * 100);
        document.getElementById('progress-bar').style.width = progress + '%';

        const prompt = `Task: Shorten game text. 
Rules:
1. Max bytes allowed: listed in JSON. (Current Turkish text is too long).
2. Keep meaning, use abbreviations if needed (e.g. 'Seviye' -> 'Svy.').
3. Return ONLY a JSON array of objects: [{"index": idx, "trans": "new_text"}].

Data to process:
${JSON.stringify(batch.map(b => ({ index: b.index, text: b.orig, max_bytes: b.bytes })))}`;

        const raw = await callGemini(prompt);

        if (raw === "RATE_LIMIT") {
            showToast("Hız sınırı aşıldı! 60sn mola...", "warn");
            await sleep(60000); i -= BATCH_SIZE; continue;
        }

        if (raw === "MODEL_NOT_FOUND") {
            showToast("Model ismi hatalı! Lütfen listeyi kontrol edin.", "err"); break;
        }

        const results = extractJSON(raw);
        if (results && Array.isArray(results)) {
            results.forEach(res => {
                const area = document.getElementById(`trg-${res.index}`);
                if (area) {
                    area.value = res.trans;
                    globalRows[res.index].trans = res.trans;
                    document.getElementById(`stat-${res.index}`).style.color = "#22c55e";
                    document.getElementById(`stat-${res.index}`).textContent = "DÜZELTİLDİ";
                }
            });
        } else {
            showToast(`Paket ${i/BATCH_SIZE + 1} başarısız oldu, atlanıyor.`, "err");
        }

        // Dakikada 15 istek sınırını aşmamak için bekleme
        await sleep(SAFE_DELAY);
    }

    showToast("İşlem tamamlandı!", "ok");
    document.getElementById('progress-bar').style.width = '100%';
}

function exportFile() {
    let output = "";
    globalRows.forEach(r => {
        const finalTrans = document.getElementById(`trg-${globalRows.indexOf(r)}`).value;
        output += `${r.offset}|${r.bytes}|${finalTrans}\n`;
    });
    const blob = new Blob([output], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "fixed_translation.txt";
    a.click();
}
</script>
</body>
</html>
